name: Flutter CI

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main" ]

# Grants permissions to the GITHUB_TOKEN
permissions:
  contents: write    # Required for creating releases
  pages: write       # Required for deploying to GitHub Pages
  id-token: write    # Required for GitHub Pages deployment

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: 'any'
        channel: 'stable'
        
    - name: Install dependencies
      working-directory: ./my_app
      run: flutter pub get
      
    - name: Analyze project source
      working-directory: ./my_app
      run: flutter analyze
      
    - name: Run tests
      working-directory: ./my_app
      run: flutter test
      
    - name: Build Web App
      working-directory: ./my_app
      # Uses --base-href to ensure assets load correctly on GitHub pages (e.g. /Earn---/)
      run: flutter build web --release --base-href /${{ github.event.repository.name }}/

    - name: Build Android APK
      working-directory: ./my_app
      run: flutter build apk --release

    - name: Upload Web Artifact
      uses: actions/upload-artifact@v4
      with:
        name: earn-plus-plus-web
        path: my_app/build/web/

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: earn-plus-plus-apk
        path: my_app/build/app/outputs/flutter-apk/app-release.apk

    - name: Upload Pages Artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v3
      with:
        path: my_app/build/web/

    - name: Create Release and Upload APK
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: my_app/build/app/outputs/flutter-apk/app-release.apk
        generate_release_notes: true

  deploy-pages:
    # Only deploy to pages from the main branch after a successful build
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
